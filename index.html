<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Clock Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Titillium+Web:wght@600;700;900&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-shell">
        <!-- Top controls -->
        <header class="top-menu">
            <div class="menu-card">
                <span class="menu-title">Time Region</span>
                <button id="open-timezone" class="menu-action" type="button">Change</button>
                <span id="current-zone" class="menu-zone">System Local</span>
            </div>

            <div class="menu-card display-card">
                <span class="menu-title">Display</span>
                <div class="display-controls">
                    <div class="mode-switch" role="group" aria-label="Color mode">
                        <button class="mode-btn" type="button" data-theme-mode="auto">Default</button>
                        <button class="mode-btn" type="button" data-theme-mode="light">Light</button>
                        <button class="mode-btn" type="button" data-theme-mode="dark">Dark</button>
                    </div>

                    <div class="mode-switch title-mode-switch" role="group" aria-label="Tab title time format">
                        <button class="mode-btn title-mode-btn" type="button" data-title-mode="ampm">AM/PM</button>
                        <button class="mode-btn title-mode-btn" type="button" data-title-mode="military">24H</button>
                    </div>

                    <button id="open-interface" class="menu-action" type="button">Clock Interface</button>
                </div>
            </div>
        </header>

        <!-- Main clock -->
        <main class="clock-stage">
            <div class="clock-container">
                <div class="clock">
                    <div class="number number-1">1</div>
                    <div class="number number-2">2</div>
                    <div class="number number-3">3</div>
                    <div class="number number-4">4</div>
                    <div class="number number-5">5</div>
                    <div class="number number-6">6</div>
                    <div class="number number-7">7</div>
                    <div class="number number-8">8</div>
                    <div class="number number-9">9</div>
                    <div class="number number-10">10</div>
                    <div class="number number-11">11</div>
                    <div class="number number-12">12</div>

                    <div class="center-dot"></div>

                    <div class="hand-shadow hour-shadow"></div>
                    <div class="hand-shadow minute-shadow"></div>
                    <div class="hand-shadow second-shadow"></div>

                    <div class="hand hour-hand"></div>
                    <div class="hand minute-hand"></div>
                    <div class="hand second-hand"></div>
                </div>
            </div>

            <!-- Clock interface carousel -->
            <section class="interface-panel" id="interface-panel" aria-hidden="true" aria-label="Clock interface selector">
                <div class="interface-panel-header">
                    <span class="menu-title">Clock Interface</span>
                    <button id="close-interface" class="menu-action close-interface" type="button">Close</button>
                </div>
                <section class="style-carousel" aria-label="Clock style carousel">
                    <button id="style-prev" class="carousel-nav" type="button" aria-label="Previous clock style">&#10094;</button>
                    <div class="style-viewport">
                        <div id="style-track" class="style-track"></div>
                    </div>
                    <button id="style-next" class="carousel-nav" type="button" aria-label="Next clock style">&#10095;</button>
                </section>
                <p class="interface-hint">Use arrows to preview left and right styles in an infinite loop.</p>
                <div class="interface-panel-actions">
                    <button id="apply-interface" class="menu-action" type="button">Use This Clock</button>
                </div>
            </section>
        </main>
    </div>

    <div class="screen-fade" id="screen-fade"></div>

    <!-- Timezone picker modal -->
    <section class="timezone-modal" id="timezone-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="timezone-title">
        <button id="close-timezone" class="close-modal" type="button" aria-label="Close timezone menu">Close</button>
        <h2 id="timezone-title">Pick A Time Region</h2>
        <p id="timezone-hover-label" class="timezone-hover-label">Hover a region and click to set the clock.</p>

        <div class="globe-shell" id="globe-shell">
            <div class="map-track" id="map-track">
                <div id="timezone-overlay" class="timezone-overlay" aria-label="Timezone selector">
                    <div id="timezone-strip" class="timezone-strip"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/app.js"></script>
</body>
</html>
